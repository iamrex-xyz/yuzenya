<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annual Health Plan Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAF8;
  --text: #1A1A1A;
  --accent: #C96442;
  --accent-hover: #B55636;
  --muted: #8A8A82;
  --border: #E0DED8;
  --green: #2D8A4E;
  --amber: #C4841D;
  --red: #C53030;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

#root { min-height: 100vh; }

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* API Key Bar */
.api-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  padding: 8px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.api-bar label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.api-bar input {
  font-family: var(--sans);
  font-size: 13px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: white;
  width: 320px;
  max-width: 50vw;
  outline: none;
  transition: border-color 0.2s;
}
.api-bar input:focus { border-color: var(--accent); }
.api-bar input::placeholder { color: #C0BEB8; }

/* Progress */
.progress {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin: 60px 0 48px;
}
.progress-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s;
  flex-shrink: 0;
}
.progress-dot.active { background: var(--accent); }
.progress-dot.completed { background: var(--accent); opacity: 0.5; }
.progress-line {
  width: 60px;
  height: 1px;
  background: var(--border);
}

/* Typography */
h1 {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 600;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
h2 {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
}
p.subtitle {
  color: var(--muted);
  font-size: 15px;
  margin-bottom: 36px;
}

/* Upload Zone */
.upload-zone {
  border: 2px dashed var(--border);
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 24px;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(201,100,66,0.03);
}
.upload-zone p { color: var(--muted); font-size: 15px; }
.upload-zone .browse { color: var(--accent); text-decoration: underline; cursor: pointer; }
.upload-zone input { display: none; }

.file-preview {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.file-preview .file-info {
  display: flex;
  flex-direction: column;
}
.file-preview .file-name { font-weight: 500; font-size: 15px; }
.file-preview .file-size { font-size: 13px; color: var(--muted); }
.file-preview button {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  text-decoration: underline;
}
.file-preview button:hover { color: var(--text); }

/* Buttons */
.btn {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  padding: 14px 32px;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  transition: background 0.2s, opacity 0.2s;
  display: inline-block;
}
.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled {
  background: var(--border);
  color: var(--muted);
  cursor: not-allowed;
}
.btn-secondary {
  background: none;
  color: var(--muted);
  padding: 14px 16px;
}
.btn-secondary:hover { color: var(--text); }
.btn-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 36px;
}

/* Form Elements */
.form-group {
  margin-bottom: 32px;
}
.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 10px;
  color: var(--text);
}
.form-group .label-detail {
  font-weight: 300;
  color: var(--muted);
  font-size: 13px;
  margin-left: 4px;
}

/* Slider */
.slider-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
}
.slider-wrap input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 2px;
  background: var(--border);
  outline: none;
}
.slider-wrap input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.slider-wrap input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
}
.slider-value {
  font-size: 18px;
  font-weight: 600;
  min-width: 32px;
  text-align: center;
  font-family: var(--serif);
}

/* Option Pills */
.option-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.option-pill {
  padding: 8px 18px;
  font-size: 14px;
  font-family: var(--sans);
  border: 1px solid var(--border);
  background: white;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 2px;
}
.option-pill:hover { border-color: var(--accent); }
.option-pill.selected {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* Text Inputs */
input[type="number"], input[type="text"], textarea {
  font-family: var(--sans);
  font-size: 15px;
  width: 100%;
  padding: 10px 0;
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  outline: none;
  transition: border-color 0.2s;
  color: var(--text);
}
input[type="number"]:focus, input[type="text"]:focus, textarea:focus {
  border-bottom-color: var(--accent);
}
textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}
input::placeholder, textarea::placeholder { color: #C0BEB8; }

/* Loading */
.loading-wrap {
  text-align: center;
  padding: 80px 0;
}
.loading-wrap p {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--text);
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}
.loading-dots {
  display: inline-flex;
  gap: 6px;
  margin-top: 24px;
}
.loading-dots span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.4s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

/* Plan Output */
.plan-output {
  line-height: 1.7;
}
.plan-output h1, .plan-output h2, .plan-output h3 {
  font-family: var(--serif);
  margin-top: 40px;
  margin-bottom: 12px;
}
.plan-output h1 { font-size: 28px; }
.plan-output h2 { font-size: 22px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.plan-output h3 { font-size: 18px; }
.plan-output p { margin-bottom: 16px; }
.plan-output ul, .plan-output ol { margin-bottom: 16px; padding-left: 24px; }
.plan-output li { margin-bottom: 6px; }
.plan-output strong { font-weight: 600; }
.plan-output hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
.plan-output blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 16px;
  color: var(--muted);
  margin: 16px 0;
  font-style: italic;
}

/* Color-coded markers */
.plan-output .optimal, .plan-output [data-status="optimal"] { color: var(--green); font-weight: 600; }
.plan-output .borderline, .plan-output [data-status="borderline"] { color: var(--amber); font-weight: 600; }
.plan-output .concerning, .plan-output [data-status="concerning"] { color: var(--red); font-weight: 600; }

/* Action bar */
.action-bar {
  display: flex;
  gap: 12px;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.action-bar .btn {
  font-size: 14px;
  padding: 10px 20px;
}

/* Error */
.error-msg {
  background: #FFF5F5;
  color: var(--red);
  padding: 16px;
  font-size: 14px;
  margin-bottom: 24px;
  border-left: 3px solid var(--red);
}

/* Print */
@media print {
  .api-bar, .progress, .action-bar, .btn-row, .btn-secondary { display: none !important; }
  .container { max-width: 100%; padding: 20px; }
  .plan-output h2 { break-after: avoid; }
  body { font-size: 12pt; }
}

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 32px 16px 60px; }
  h1 { font-size: 26px; }
  .api-bar input { width: 200px; }
  .option-pill { font-size: 13px; padding: 6px 14px; }
  .upload-zone { padding: 32px 16px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ---------- Helpers ----------

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function pdfToBase64Image(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  // Render up to first 3 pages
  const pages = Math.min(pdf.numPages, 3);
  const canvases = [];

  for (let i = 1; i <= pages; i++) {
    const page = await pdf.getPage(i);
    const scale = 2;
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    canvases.push(canvas);
  }

  // Stitch canvases vertically
  const totalHeight = canvases.reduce((sum, c) => sum + c.height, 0);
  const maxWidth = Math.max(...canvases.map(c => c.width));
  const stitched = document.createElement('canvas');
  stitched.width = maxWidth;
  stitched.height = totalHeight;
  const ctx = stitched.getContext('2d');
  let y = 0;
  for (const c of canvases) {
    ctx.drawImage(c, 0, y);
    y += c.height;
  }

  return stitched.toDataURL('image/png').split(',')[1];
}

function getMediaType(file) {
  if (file.type === 'application/pdf') return 'image/png'; // we convert PDF to PNG
  if (file.type === 'image/png') return 'image/png';
  if (file.type === 'image/jpeg' || file.type === 'image/jpg') return 'image/jpeg';
  return 'image/png';
}

function colorCodePlan(html) {
  // Color-code markers: ✅ optimal, ⚠️ borderline, 🔴 concerning
  html = html.replace(/✅\s*([\w\s\/\(\)\-\.:]+)/g, '<span class="optimal">✅ $1</span>');
  html = html.replace(/⚠️\s*([\w\s\/\(\)\-\.:]+)/g, '<span class="borderline">⚠️ $1</span>');
  html = html.replace(/🔴\s*([\w\s\/\(\)\-\.:]+)/g, '<span class="concerning">🔴 $1</span>');
  // Also catch [OPTIMAL], [BORDERLINE], [CONCERNING] tags
  html = html.replace(/\[OPTIMAL\]/gi, '<span class="optimal">[OPTIMAL]</span>');
  html = html.replace(/\[BORDERLINE\]/gi, '<span class="borderline">[BORDERLINE]</span>');
  html = html.replace(/\[CONCERNING\]/gi, '<span class="concerning">[CONCERNING]</span>');
  return html;
}

async function callClaude(apiKey, base64Image, mediaType, questionnaire) {
  const systemPrompt = `You are a preventive health analyst. Analyze the provided bloodwork results and behavioral data. Be specific, prioritized, and actionable. Never be vague. Structure your response with clear sections. Include one brief medical disclaimer at the end.

Format your response in markdown with these exact sections:
# Your Biomarker Summary
For each key biomarker, list the value and mark status using these exact markers:
- ✅ for optimal values
- ⚠️ for borderline values  
- 🔴 for concerning values

# Top 3 Priorities
The highest-leverage changes based on combined bloodwork + behavioral data.

# 90-Day Protocol
Specific actionable steps organized by category:
## Sleep
## Nutrition  
## Movement
## Supplementation

# What to Retest in 6 Months
Which markers to track and why.

# Your Risk Flags
Anything warranting a doctor conversation.

---
*Medical Disclaimer*`;

  const userMessage = `Here is my bloodwork (attached as image) and my behavioral health questionnaire:

- Sleep: ${questionnaire.sleepHours} hours/night, quality: ${questionnaire.sleepQuality}
- Stress level: ${questionnaire.stressLevel}/10
- Exercise: ${questionnaire.exerciseType}, ${questionnaire.exerciseFreq} days/week
- Alcohol: ${questionnaire.alcohol} units/week
- Diet: ${questionnaire.diet}
- Energy pattern: ${questionnaire.energy}
- Health goal: ${questionnaire.goal}
- Smoking: ${questionnaire.smoking}
- Current supplements: ${questionnaire.supplements || 'None'}
- Additional notes: ${questionnaire.notes || 'None'}

Please analyze my bloodwork results from the image and combine with this behavioral data to generate my personalized annual health plan.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4096,
      system: systemPrompt,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: {
              type: 'base64',
              media_type: mediaType,
              data: base64Image
            }
          },
          { type: 'text', text: userMessage }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error: ${response.status}`);
  }

  const data = await response.json();
  return data.content[0].text;
}


// ---------- Components ----------

function ApiKeyBar({ apiKey, setApiKey }) {
  return (
    <div className="api-bar">
      <label>API Key</label>
      <input
        type="password"
        placeholder="sk-ant-..."
        value={apiKey}
        onChange={e => {
          setApiKey(e.target.value);
          sessionStorage.setItem('anthropic_key', e.target.value);
        }}
      />
    </div>
  );
}

function ProgressIndicator({ step }) {
  return (
    <div className="progress">
      {[1, 2, 3].map((s, i) => (
        <React.Fragment key={s}>
          {i > 0 && <div className="progress-line" />}
          <div className={`progress-dot ${s === step ? 'active' : s < step ? 'completed' : ''}`} />
        </React.Fragment>
      ))}
    </div>
  );
}

function UploadStep({ file, setFile, onNext }) {
  const inputRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);

  const handleFile = (f) => {
    const valid = ['application/pdf', 'image/jpeg', 'image/png', 'image/jpg'];
    if (f && valid.includes(f.type)) {
      setFile(f);
    }
  };

  return (
    <div>
      <h1>Upload your bloodwork</h1>
      <p className="subtitle">PDF or image of your most recent lab results.</p>

      {!file ? (
        <div
          className={`upload-zone ${dragOver ? 'drag-over' : ''}`}
          onClick={() => inputRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
        >
          <p>Drag and drop your file here, or <span className="browse">browse</span></p>
          <p style={{ fontSize: 13, marginTop: 8, color: '#B0AEA6' }}>.pdf, .jpg, .png</p>
          <input
            ref={inputRef}
            type="file"
            accept=".pdf,.jpg,.jpeg,.png"
            onChange={e => handleFile(e.target.files[0])}
          />
        </div>
      ) : (
        <div className="file-preview">
          <div className="file-info">
            <span className="file-name">{file.name}</span>
            <span className="file-size">{formatFileSize(file.size)}</span>
          </div>
          <button onClick={() => setFile(null)}>Remove</button>
        </div>
      )}

      <div className="btn-row">
        <div />
        <button className="btn btn-primary" disabled={!file} onClick={onNext}>
          Continue
        </button>
      </div>
    </div>
  );
}

function OptionSelect({ options, value, onChange }) {
  return (
    <div className="option-group">
      {options.map(opt => (
        <div
          key={opt}
          className={`option-pill ${value === opt ? 'selected' : ''}`}
          onClick={() => onChange(opt)}
        >
          {opt}
        </div>
      ))}
    </div>
  );
}

function QuestionnaireStep({ answers, setAnswers, onNext, onBack }) {
  const update = (key, val) => setAnswers(prev => ({ ...prev, [key]: val }));

  return (
    <div>
      <h1>Your health profile</h1>
      <p className="subtitle">Quick questions to personalize your plan.</p>

      <div className="form-group">
        <label>Sleep hours per night</label>
        <div className="slider-wrap">
          <input type="range" min="4" max="10" step="0.5" value={answers.sleepHours}
            onChange={e => update('sleepHours', e.target.value)} />
          <span className="slider-value">{answers.sleepHours}</span>
        </div>
      </div>

      <div className="form-group">
        <label>Sleep quality</label>
        <OptionSelect options={['Poor', 'Fair', 'Good', 'Excellent']}
          value={answers.sleepQuality} onChange={v => update('sleepQuality', v)} />
      </div>

      <div className="form-group">
        <label>Stress level <span className="label-detail">(1 = zen, 10 = overwhelmed)</span></label>
        <div className="slider-wrap">
          <input type="range" min="1" max="10" step="1" value={answers.stressLevel}
            onChange={e => update('stressLevel', e.target.value)} />
          <span className="slider-value">{answers.stressLevel}</span>
        </div>
      </div>

      <div className="form-group">
        <label>Exercise type</label>
        <OptionSelect options={['None', 'Walking', 'Cardio', 'Strength', 'Mixed']}
          value={answers.exerciseType} onChange={v => update('exerciseType', v)} />
      </div>

      <div className="form-group">
        <label>Exercise frequency <span className="label-detail">(days/week)</span></label>
        <div className="slider-wrap">
          <input type="range" min="0" max="7" step="1" value={answers.exerciseFreq}
            onChange={e => update('exerciseFreq', e.target.value)} />
          <span className="slider-value">{answers.exerciseFreq}</span>
        </div>
      </div>

      <div className="form-group">
        <label>Alcohol <span className="label-detail">(units per week)</span></label>
        <input type="number" min="0" max="50" placeholder="0"
          value={answers.alcohol} onChange={e => update('alcohol', e.target.value)} />
      </div>

      <div className="form-group">
        <label>Diet pattern</label>
        <OptionSelect options={['Omnivore', 'Plant-based', 'Keto', 'Mediterranean', 'Other']}
          value={answers.diet} onChange={v => update('diet', v)} />
      </div>

      <div className="form-group">
        <label>Energy pattern</label>
        <OptionSelect options={['Morning person', 'Evening person', 'Consistent', 'Always tired']}
          value={answers.energy} onChange={v => update('energy', v)} />
      </div>

      <div className="form-group">
        <label>Main health goal</label>
        <OptionSelect options={['Longevity', 'Performance', 'Weight management', 'Mental clarity', 'Hormonal balance']}
          value={answers.goal} onChange={v => update('goal', v)} />
      </div>

      <div className="form-group">
        <label>Smoking</label>
        <OptionSelect options={['Never', 'Former', 'Current']}
          value={answers.smoking} onChange={v => update('smoking', v)} />
      </div>

      <div className="form-group">
        <label>Supplements currently taking</label>
        <input type="text" placeholder="e.g. Vitamin D, Magnesium, Fish oil…"
          value={answers.supplements} onChange={e => update('supplements', e.target.value)} />
      </div>

      <div className="form-group">
        <label>Anything else your doctor should know?</label>
        <textarea placeholder="Medications, conditions, recent changes…"
          value={answers.notes} onChange={e => update('notes', e.target.value)} />
      </div>

      <div className="btn-row">
        <button className="btn btn-secondary" onClick={onBack}>← Back</button>
        <button className="btn btn-primary" onClick={onNext}>Generate my plan</button>
      </div>
    </div>
  );
}

function LoadingState() {
  return (
    <div className="loading-wrap">
      <p>Analyzing your data…</p>
      <div className="loading-dots">
        <span /><span /><span />
      </div>
    </div>
  );
}

function PlanStep({ plan, rawMarkdown, onBack }) {
  const planRef = useRef(null);

  const handlePrint = () => window.print();
  const handleCopy = () => {
    navigator.clipboard.writeText(rawMarkdown).then(() => {
      alert('Plan copied to clipboard as markdown.');
    });
  };

  const html = colorCodePlan(marked.parse(rawMarkdown));

  return (
    <div>
      <h1>Your Annual Health Plan</h1>
      <p className="subtitle">Generated from your bloodwork and health profile.</p>

      <div className="plan-output" ref={planRef} dangerouslySetInnerHTML={{ __html: html }} />

      <div className="action-bar">
        <button className="btn btn-primary" onClick={handlePrint}>🖨 Print</button>
        <button className="btn btn-primary" onClick={handleCopy}>📋 Copy as Markdown</button>
        <button className="btn btn-secondary" onClick={onBack}>← Start over</button>
      </div>
    </div>
  );
}


// ---------- App ----------

function App() {
  const [apiKey, setApiKey] = useState(() => sessionStorage.getItem('anthropic_key') || '');
  const [step, setStep] = useState(1);
  const [file, setFile] = useState(null);
  const [answers, setAnswers] = useState({
    sleepHours: 7,
    sleepQuality: 'Good',
    stressLevel: 5,
    exerciseType: 'Mixed',
    exerciseFreq: 3,
    alcohol: 0,
    diet: 'Omnivore',
    energy: 'Consistent',
    goal: 'Longevity',
    smoking: 'Never',
    supplements: '',
    notes: ''
  });
  const [loading, setLoading] = useState(false);
  const [plan, setPlan] = useState('');
  const [error, setError] = useState('');

  const generatePlan = async () => {
    if (!apiKey) {
      setError('Please enter your Anthropic API key at the top of the page.');
      return;
    }
    setError('');
    setLoading(true);
    setStep(3);

    try {
      let base64;
      let mediaType = getMediaType(file);

      if (file.type === 'application/pdf') {
        base64 = await pdfToBase64Image(file);
      } else {
        base64 = await fileToBase64(file);
      }

      const result = await callClaude(apiKey, base64, mediaType, answers);
      setPlan(result);
    } catch (err) {
      setError(err.message || 'Something went wrong. Please try again.');
      setStep(2);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div>
      <ApiKeyBar apiKey={apiKey} setApiKey={setApiKey} />
      <div className="container">
        <ProgressIndicator step={step} />

        {error && <div className="error-msg">{error}</div>}

        {step === 1 && (
          <UploadStep file={file} setFile={setFile} onNext={() => setStep(2)} />
        )}

        {step === 2 && (
          <QuestionnaireStep
            answers={answers}
            setAnswers={setAnswers}
            onNext={generatePlan}
            onBack={() => setStep(1)}
          />
        )}

        {step === 3 && loading && <LoadingState />}

        {step === 3 && !loading && plan && (
          <PlanStep
            plan={plan}
            rawMarkdown={plan}
            onBack={() => { setPlan(''); setStep(1); }}
          />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
